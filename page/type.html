
    <!DOCTYPE html>

    <!-- Bootstrap 5 -->

    <link href="https://fonts.googleapis.com/css2?family=Khmer+OS+Siemreap:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Khmer OS Siemreap', sans-serif;
        }
        body {
            background-color: #f0f2f5;
        }
        .page-container {
            max-width: 960px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 0 15px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        /* របារម៉ឺនុយខាងលើ */
        .top-nav {
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 20px;
        }
        .logo-icon {
            width: 26px;
            height: 26px;
            margin-right: 6px;
        }
        .nav-links a {
            font-size: 15px;
            padding: 0 12px;
            color: #222;
            text-decoration: none;
        }
        .nav-links a.active {
            font-weight: bold;
            border-bottom: 2px solid #222;
        }
        .btn-signin {
            background-color: #4a6fa5;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 14px;
        }
        /* ចំណងជើងធំ */
        .main-title {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            padding: 25px 0 15px;
            color: #111;
        }
        /* ប៊ូតុងតម្រង */
        .filter-buttons {
            padding: 0 20px 20px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-btn {
            border-radius: 20px;
            padding: 6px 16px;
            border: 1px solid #d1d5db;
            background: #fff;
            font-size: 15px;
        }
        .filter-btn.active {
            background-color: #4a6fa5;
            color: white;
            border-color: #4a6fa5;
        }
        /* កាតបង្ហាញកន្លែងស្នាក់នៅ */
        .place-card {
            border: none;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .place-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .place-name {
            font-weight: bold;
            font-size: 20px;
            margin: 10px 0 4px;
            color: #111;
        }
        .place-en {
            font-size: 15px;
            color: #666;
            margin-bottom: 15px;
        }
        @media (max-width: 768px) {
            .main-title {
                font-size: 28px;
            }
            .place-img {
                height: 220px;
            }
            .nav-links a {
                padding: 0 6px;
                font-size: 14px;
            }
        }
    </style>
</head>

<div class="page-container">

    <!-- ចំណងជើង -->
    <h1 class="main-title">Type</h1>

    <div class="d-flex filter-buttons">
        <button class="filter-btn active">All</button>
        <button class="filter-btn">Villa</button>
        <button class="filter-btn">Resort</button>
        <button class="filter-btn">Homestay</button>
        <button class="filter-btn">Boutique Hotel</button>
    </div>

    <!-- បញ្ជីកន្លែងស្នាក់នៅ -->
    <div class="container-fluid px-3">
        <div class="row g-3">
            <!-- វីឡាក្បែរសមុទ្រ -->
            <div class="col-md-6">
                <div class="place-card">
                    <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="វីឡាក្បែរសមុទ្រ" class="place-img">
                    <h3 class="place-name">វីឡាក្បែរសមុទ្រ</h3>
                    <p class="place-en">Seaside Villa</p>
                </div>
            </div>

            <!-- រីសតក្នុងព្រៃ -->
            <div class="col-md-6">

            <!-- ផ្ទះបុរាណ -->
            <div class="col-md-6">
                <div class="place-card">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Khmer_traditional_house_02.jpg/800px-Khmer_traditional_house_02.jpg" alt="ផ្ទះបុរាណ" class="place-img">
                    <h3 class="place-name">ផ្ទះបុរាណ</h3>
                    <p class="place-en">Traditional Homestay</p>
                </div>
            </div>

            <!-- សណ្ឋាគារទីក្រុង -->
            <div class="col-md-6">
                <div class="place-card">
                    <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="សណ្ឋាគារទីក្រុង" class="place-img">
                    <h3 class="place-name">សណ្ឋាគារទីក្រុង</h3>
                    <p class="place-en">City Boutique Hotel</p>
